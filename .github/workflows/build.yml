name: Build HyperOS Icon Packer APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            libltdl-dev libgdbm-dev \
            build-essential ccache

      - name: Set up Java 17
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          java -version

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.6.0 cython==0.29.37 pillow kivy==2.3.1

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            ~/android-sdk
          key: android-sdk-${{ runner.os }}-v1

      - name: Build APK
        run: |
          buildozer android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperOS-Icon-Packer-APK
          path: bin/*.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: HyperOS Icon Packer v1.0.${{ github.run_number }}
          body: |
            ## HyperOS Icon Packer
            Automated build from GitHub Actions.

            ### Install
            Download the .apk file below and install on your Android device.
            (Enable "Install from unknown sources" in Settings first)

            ### What it does
            - Select any icon pack APK
            - Auto-extracts and renames icons to package names
            - Optional resize to any px size
            - Outputs Final.zip ready for MT Manager injection
          files: bin/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
