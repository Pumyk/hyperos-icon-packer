name: Build HyperOS Icon Packer APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            libltdl-dev build-essential ccache

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.6.0 cython==0.29.37 pillow kivy==2.3.1

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v3
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Pre-download Android SDK and install build-tools into buildozer path
        run: |
          # Create buildozer's expected SDK path
          BSDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $BSDK

          # Download command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools
          mkdir -p $BSDK/cmdline-tools/latest
          cp -r /tmp/cmdtools/cmdline-tools/* $BSDK/cmdline-tools/latest/

          # Accept licenses
          yes | $BSDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$BSDK --licenses > /dev/null 2>&1 || true

          # Install required packages into buildozer's SDK
          $BSDK/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$BSDK \
            "build-tools;33.0.2" \
            "platforms;android-33" \
            "platform-tools"

          # Verify aidl is there
          ls $BSDK/build-tools/33.0.2/aidl
          echo "AIDL found at $BSDK/build-tools/33.0.2/aidl"

          # Set ANDROID_HOME for buildozer
          echo "ANDROID_HOME=$BSDK" >> $GITHUB_ENV
          echo "$BSDK/build-tools/33.0.2" >> $GITHUB_PATH
          echo "$BSDK/platform-tools" >> $GITHUB_PATH

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperOS-Icon-Packer-APK
          path: bin/*.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: HyperOS Icon Packer v1.0.${{ github.run_number }}
          body: |
            ## HyperOS Icon Packer
            Automated build from GitHub Actions.

            ### Install
            Download the .apk below and install on your Android device.
            (Enable "Install from unknown sources" in Settings first)

            ### What it does
            - Select any icon pack APK
            - Auto-extracts and renames icons to package names
            - Optional resize to any px size
            - Outputs Final.zip ready for MT Manager injection
          files: bin/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
